<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chuma Admin</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app">
      <section class="auth-shell">
        <div class="auth-panel">
          <p class="eyebrow">Chuma Admin</p>
          <h1>Sign in</h1>
          <p class="muted">Use an admin Firebase Auth account to manage users, goals, expenses, and investment options.</p>
          <form id="login-form" class="form">
            <label>
              Email
              <input id="email" type="email" autocomplete="email" required />
            </label>
            <label>
              Password
              <input id="password" type="password" autocomplete="current-password" required />
            </label>
            <button type="submit">Sign in</button>
            <p id="auth-message" class="message" role="status"></p>
          </form>
        </div>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
